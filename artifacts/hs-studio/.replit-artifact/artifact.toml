kind = "web"
previewPath = "/"
title = "HS Studio"
version = "1.0.0"
id = "artifacts/hs-studio"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22223

[services.development]
run = "pnpm --filter @workspace/hs-studio run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/hs-studio", "run", "build" ]
publicDir = "artifacts/hs-studio/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22223"
BASE_PATH = "/"
